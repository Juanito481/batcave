# claude-security.yml — White Rook scan su push a main
# Scansione universale: nessun filtro path, ogni push a main viene analizzato.
#
# Prerequisiti:
#   1. ANTHROPIC_API_KEY come secret nel repo GitHub

name: Claude Security Scan

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  white-rook-scan:
    name: "White Rook Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Claude Security Scan
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          direct_prompt: |
            Sei White Rook della Scacchiera Alfred — La Fortezza. Scansione di sicurezza sui file appena pushati a main.

            Controlla i file cambiati nell'ultimo commit per:

            1. SECRET EXPOSURE
               - Credenziali hardcoded, API key, password in chiaro
               - .env file committati per errore
               - Token in header o query string

            2. OWASP TOP 10
               - SQL/NoSQL injection (query non parametrizzate)
               - XSS (output non sanitizzato)
               - Broken auth (session management debole)
               - SSRF (URL da user input non validati)

            3. ALFRED SECURITY PATTERNS
               - Auth: JWT RS256, bcrypt 13+ rounds, DB role resolution
               - API: rate limiting presente, safe error responses, no stack trace leak
               - Input: validation con enum arrays, type guards

            4. GDPR
               - Dati personali ospiti loggati in chiaro?
               - Consent management presente dove serve?

            Se trovi ZERO problemi, scrivi "Clean — nessun finding di sicurezza."

            Se trovi problemi, per ognuno:
            - Severity: CRITICAL / HIGH / MEDIUM
            - File:riga
            - Descrizione in 1-2 frasi
            - Fix suggerito

            Per finding CRITICAL, apri una GitHub Issue con label "security" e assegnala a Juanito481.

      - name: Get changed files
        id: changed
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
